<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coordinator Adviser Assignments | U-Tracksis</title>

    <!-- Apply theme immediately -->
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        var d =
          t ||
          (window.matchMedia("(prefers-color-scheme:dark)").matches
            ? "dark"
            : "light");
        if (d === "dark")
          document.documentElement.setAttribute("data-theme", "dark");
      })();
    </script>

    <!-- bootstrap css -->
    <link rel="stylesheet" href="../../css/bootstrap.min.css" />

    <!-- local bootstrap icons -->
    <link rel="stylesheet" href="../../css/bootstrap-icons.css" />

    <!-- custom css -->
    <link
      rel="stylesheet"
      href="../../css/coordinator/coordinator-dashboard.css"
    />
  </head>
  <body>
    <div class="dashboard-wrapper">
      <!-- sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <img
            src="../../assets/images/logo.png"
            alt="U-Tracksis"
            class="sidebar-logo"
          />
          <div>
            <h6 class="sidebar-title">U-Tracksis</h6>
            <p class="sidebar-subtitle">COORDINATOR</p>
          </div>
        </div>

        <nav class="sidebar-nav">
          <a class="nav-link" href="coordinator-overview.html">
            <img
              src="../../assets/icons/binoculars-fill.svg"
              alt=""
              class="bi"
            />
            Overview
          </a>
          <a class="nav-link" href="coordinator-group-formations.html">
            <img src="../../assets/icons/people-fill.svg" alt="" class="bi" />
            Group Formations
          </a>
          <a
            class="nav-link active"
            href="coordinator-adviser-assignments.html"
          >
            <img
              src="../../assets/icons/diagram-3-fill.svg"
              alt=""
              class="bi"
            />
            Adviser Assignments
          </a>
          <a class="nav-link" href="coordinator-course-announcements.html">
            <img
              src="../../assets/icons/megaphone-fill.svg"
              alt=""
              class="bi"
            />
            Announcements
          </a>
          <a class="nav-link" href="coordinator-course-progress.html">
            <img src="../../assets/icons/flag-fill.svg" alt="" class="bi" />
            Course Progress
          </a>
        </nav>

        <div class="sidebar-footer">
          <span>Theme</span>
          <button
            class="theme-toggle"
            id="themeToggle"
            type="button"
            title="Toggle theme"
          >
            <img
              src="../../assets/icons/moon-stars-fill.svg"
              alt=""
              class="bi"
              id="themeIcon"
            />
          </button>
        </div>
      </aside>

      <!-- mobile overlay -->
      <div class="sidebar-overlay" id="sidebarOverlay"></div>

      <!-- main content -->
      <main class="main-content">
        <!-- top bar with search and actions -->
        <div class="top-bar">
          <button class="mobile-menu-btn" id="menuBtn" type="button">
            <img src="../../assets/icons/list.svg" alt="" class="bi" />
          </button>

          <div class="topbar-search">
            <img
              src="../../assets/icons/search.svg"
              alt=""
              class="bi search-icon"
            />
            <input type="text" class="form-control" placeholder="Search..." />
          </div>

          <div class="topbar-actions">
            <button
              class="btn-new-submission"
              type="button"
              onclick="
                window.location.href = 'coordinator-course-announcements.html'
              "
            >
              <img src="../../assets/icons/plus-lg.svg" alt="" class="bi" />
              <span>New Announcement</span>
            </button>

            <button
              class="btn-logout"
              type="button"
              onclick="
                window.location.href = '/pages/auth/auth.html#login-section'
              "
            >
              <img
                src="../../assets/icons/box-arrow-left.svg"
                alt=""
                class="bi"
              />
              <span>Logout</span>
            </button>
          </div>
        </div>

        <div class="page-header">
          <h1 class="page-title">Adviser Assignments</h1>
          <p class="page-subtitle">Good day, {coordinator_first_name}.</p>
        </div>

        <div class="row">
          <div class="col-12">
            <div class="d-flex justify-content-between align-items-center">
              <div class="flex-fill text-center">
                <p class="text fw-bold small text-uppercase mb-0">Group</p>
              </div>
              <div class="flex-fill text-center">
                <p class="text fw-bold small text-uppercase mb-0">Course</p>
              </div>
              <div class="flex-fill text-center">
                <p class="text fw-bold small text-uppercase mb-0">Adviser</p>
              </div>
              <div class="flex-fill text-center">
                <p class="text fw-bold small text-uppercase mb-0">Action</p>
              </div>
            </div>
          </div>
        </div>

        <div class="row g-4 mb-4">
          <!-- Groups -->
          <div class="box mb-4">
            <div class="row">
              <div class="col-12">
                <div class="d-flex justify-content-between align-items-center">
                  <div class="flex-fill text-center">
                    <p class="text fw-bold small text-uppercase mb-0">
                      Group A
                    </p>
                  </div>
                  <div class="flex-fill text-center">
                    <p class="mb-0">
                      <span
                        class="badge text-bg-warning text-white small text-uppercase mb-0"
                        >BS-IT</span
                      >
                    </p>
                  </div>
                  <div class="flex-fill text-center">
                    <p class="mb-0">
                      <span
                        class="badge text-bg-primary small text-uppercase mb-0"
                        >Dr. Richards V.</span
                      >
                    </p>
                  </div>
                  <div class="flex-fill text-center">
                    <p class="mb-0">
                      <span
                        class="badge text-bg-danger text-white small text-uppercase mb-0"
                        >Request</span
                      >
                    </p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="box mb-4">
            <p class="box-label">Adviser Load</p>
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h4 class="display-5 fw-bold mb-0">Dr. Richards V.</h4>
              <p class="fw-bold smallmb-0">3 / 5 Groups</p>
            </div>
            <h5 class="fst-italic ps-2">BS-IT</h5>
            <div class="progress mt-3 rounded-pill" style="height: 10px">
              <div
                class="progress-bar bg-warning"
                role="progressbar"
                style="width: 60%"
                aria-valuenow="45"
                aria-valuemin="0"
                aria-valuemax="100"
              ></div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="../../js/bootstrap.bundle.min.js"></script>
    <script src="../../js/student/theme.js"></script>

    <script>
      /* sidebar toggle */
      const sidebar = document.getElementById("sidebar");
      const menuBtn = document.getElementById("menuBtn");
      const overlay = document.getElementById("sidebarOverlay");

      function toggleSidebar() {
        sidebar.classList.toggle("show");
        overlay.classList.toggle("show");
      }

      menuBtn.addEventListener("click", toggleSidebar);
      overlay.addEventListener("click", toggleSidebar);

      /* close sidebar on link click for mobile */
      document.querySelectorAll(".sidebar-nav .nav-link").forEach((link) => {
        link.addEventListener("click", () => {
          if (window.innerWidth < 992) toggleSidebar();
        });
      });
    </script>
  </body>
</html>
